# Production services: app stack + full monitoring suite.
# Usage: docker compose -f compose.yml -f compose.prod.yml up -d

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-nginx-common: &nginx-common
  networks:
    - campus_connect_net
  healthcheck:
    test:
      [
        "CMD",
        "wget",
        "--quiet",
        "--spider",
        "--fail",
        "http://localhost:8080/nginx-health",
      ]
    interval: 10s
    timeout: 5s
    retries: 3

x-prod-env: &prod-env
  env_file:
    - .env

services:
  nginx-prod:
    <<: *nginx-common
    image: ${DOCKER_REGISTRY}/campus-connect-nginx:${IMAGE_TAG:-latest}
    container_name: campus_connect_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
      - "9000:9000"
      - "9001:9001"
    depends_on:
      app-prod:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker-prod:
        condition: service_healthy
    mem_limit: 128m
    cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=0755,size=128M,noexec,nosuid
      - /var/run:mode=0755,size=16M,noexec,nosuid
      - /tmp:mode=1777,size=64M,noexec,nosuid
    logging: *default-logging

  migrator-prod:
    <<: *prod-env
    image: ${DOCKER_REGISTRY}/campus-connect-migrator:${IMAGE_TAG:-latest}
    container_name: campus_connect_migrator_prod
    restart: on-failure:5
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NODE_ENV=production
    networks:
      - campus_connect_net
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m
    cpus: "0.25"
    logging: *default-logging

  app-prod:
    <<: *prod-env
    image: ${DOCKER_REGISTRY}/campus-connect-app:${IMAGE_TAG:-latest}
    container_name: campus_connect_app_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      create-buckets:
        condition: service_completed_successfully
      migrator-prod:
        condition: service_completed_successfully
    expose:
      - "3000"
    environment:
      - TZ=UTC
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    networks:
      - campus_connect_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/health/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 3g
    mem_reservation: 1g
    cpus: "1.5"
    cpu_shares: 1024
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=512M,noexec,nosuid
    logging: *default-logging

  worker-prod:
    <<: *prod-env
    image: ${DOCKER_REGISTRY}/campus-connect-worker:${IMAGE_TAG:-latest}
    container_name: campus_connect_worker_prod
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrator-prod:
        condition: service_completed_successfully
    networks:
      - campus_connect_net
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node dist/workers/index.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    mem_reservation: 512m
    cpus: "1.0"
    cpu_shares: 768
    stop_grace_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256M,noexec,nosuid
    logging: *default-logging

  prometheus-prod:
    image: ${DOCKER_REGISTRY}/campus-connect-prometheus:${IMAGE_TAG:-latest}
    container_name: campus_connect_prometheus_prod
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.external-url=http://localhost/prometheus"
      - "--web.route-prefix=/"
    volumes:
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - campus_connect_net
    depends_on:
      - cadvisor
      - node-exporter
      - alertmanager
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: "0.5"
    logging: *default-logging

  alertmanager:
    image: ${DOCKER_REGISTRY}/campus-connect-alertmanager:${IMAGE_TAG:-latest}
    container_name: campus_connect_alertmanager
    restart: always
    entrypoint: ["/alertmanager-entrypoint.sh"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost/alertmanager"
      - "--web.route-prefix=/"
    volumes:
      - alertmanager_data:/alertmanager
    environment:
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ALERT_EMAIL_FROM=${ALERT_EMAIL_FROM}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO}
    expose:
      - "9093"
    networks:
      - campus_connect_net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9093/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 64m
    cpus: "0.25"
    logging: *default-logging

  grafana:
    image: ${DOCKER_REGISTRY}/campus-connect-grafana:${IMAGE_TAG:-latest}
    container_name: campus_connect_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    networks:
      - campus_connect_net
    depends_on:
      - loki
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: "0.5"
    logging: *default-logging

  loki:
    image: ${DOCKER_REGISTRY}/campus-connect-loki:${IMAGE_TAG:-latest}
    container_name: campus_connect_loki
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    expose:
      - "3100"
    networks:
      - campus_connect_net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: "0.5"
    logging: *default-logging

  promtail:
    image: ${DOCKER_REGISTRY}/campus-connect-promtail:${IMAGE_TAG:-latest}
    container_name: campus_connect_promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/var/lib/promtail
    networks:
      - campus_connect_net
    depends_on:
      - loki
    mem_limit: 256m
    cpus: "0.25"
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: campus_connect_cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--docker_only=true"
      - "--store_container_labels=true"
      - "--housekeeping_interval=10s"
    expose:
      - "8080"
    networks:
      - campus_connect_net
    mem_limit: 128m
    cpus: "0.25"
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: campus_connect_node_exporter
    restart: always
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--no-collector.softnet"
      - "--no-collector.netstat"
      - "--no-collector.mdadm"
      - "--no-collector.infiniband"
      - "--no-collector.nfs"
      - "--no-collector.nfsd"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|mnt/wsl|run/user)($|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"
    networks:
      - campus_connect_net
    mem_limit: 32m
    cpus: "0.1"
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.18.1
    container_name: campus_connect_postgres_exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-connect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-campus_connect}?sslmode=disable
    expose:
      - "9187"
    networks:
      - campus_connect_net
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 32m
    cpus: "0.1"
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.80.2
    container_name: campus_connect_redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
    expose:
      - "9121"
    networks:
      - campus_connect_net
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 32m
    cpus: "0.1"
    logging: *default-logging

  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: campus_connect_backup
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-campus_connect}
      - POSTGRES_USER=${POSTGRES_USER:-connect}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=--format=custom --compress=9
      - SCHEDULE=@every 6h
      - BACKUP_ON_START=true
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - postgres_backups:/backups
    networks:
      - campus_connect_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    cpus: "0.25"
    logging: *default-logging

volumes:
  prometheus_data:
    name: campus_connect_prometheus_data
  alertmanager_data:
    name: campus_connect_alertmanager_data
  grafana_data:
    name: campus_connect_grafana_data
  loki_data:
    name: campus_connect_loki_data
  promtail_positions:
    name: campus_connect_promtail_positions
  postgres_backups:
    name: campus_connect_postgres_backups
