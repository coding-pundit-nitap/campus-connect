x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:18.2-alpine
    container_name: campus_connect_db
    restart: always
    env_file:
      - .env
    expose:
      - "5432"
    environment:
      TZ: Asia/Kolkata
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campus_connect_net
    mem_limit: 2g
    cpus: "1.0"
    shm_size: 256mb
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:mode=1777,size=256M,noexec,nosuid
      - /var/run/postgresql:mode=1777,size=64M,noexec,nosuid
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: campus_connect_minio
    restart: always
    command: server --console-address ":9001" /data
    env_file:
      - .env
    environment:
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campus_connect_net
    mem_limit: 512m
    cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=1777,size=256M,noexec,nosuid
    logging: *default-logging

  create-buckets:
    image: minio/mc
    container_name: campus_connect_mc
    pull_policy: if_not_present
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        /usr/bin/mc mb myminio/${NEXT_PUBLIC_MINIO_BUCKET} --ignore-existing;
        /usr/bin/mc anonymous set public myminio/${NEXT_PUBLIC_MINIO_BUCKET};
      "
    env_file:
      - .env
    networks:
      - campus_connect_net

  redis:
    image: redis:8.2.1-alpine
    container_name: campus_connect_redis
    restart: unless-stopped
    env_file:
      - .env
    command: >
      redis-server
      --appendonly yes
      --maxmemory 400mb
      --maxmemory-policy noeviction
      --save 900 1
      --save 300 10
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campus_connect_net
    mem_limit: 512m
    cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:mode=1777,size=64M,noexec,nosuid
    logging: *default-logging

networks:
  campus_connect_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.12.0.0/16

volumes:
  postgres_data:
    name: campus_connect_postgres_data
  minio_data:
    name: campus_connect_minio_data
  redis_data:
    name: campus_connect_redis_data
