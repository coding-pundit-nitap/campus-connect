user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log notice;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Trust NPM
    set_real_ip_from 172.16.17.75;
    set_real_ip_from 10.12.0.0/16;

    # Trust Cloudflare proxies
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # Cloudflare gives real client IP here
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    log_format main escape=json '{'
        '"level":"info",'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":"$request_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"xff":"$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:20m rate=1500r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=50r/m;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=200r/m;


    limit_req_status 429;

    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    
    # ===================================================================
    # ==== CENTRALIZED UPSTREAMS & SERVERS ====
    # ===================================================================

    # Common Upstreams (MinIO)
    upstream minio_api {
        server minio:9000 max_fails=3 fail_timeout=30s;
    }
    upstream minio_console {
        server minio:9001 max_fails=3 fail_timeout=30s;
    }

    # Common Health Check Server
    server {
        listen 8080;
        server_name localhost nginx-prod;

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.12.0.0/16;
            deny all;
        }
    }

    # Common MinIO S3 API Server
    server {
        listen 9000;
        server_name localhost;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://minio_api;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass_request_headers on;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-amz-content-sha256 $http_x_amz_content_sha256;
            proxy_set_header x-amz-date $http_x_amz_date;

            proxy_request_buffering off;
            client_max_body_size 50M;
            limit_req zone=uploads burst=50;
        }
    }

    # Common MinIO Console Server
    server {
        listen 9001;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            proxy_pass http://minio_console;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Include environment-specific configurations
    include /etc/nginx/conf.d/*.conf;
}